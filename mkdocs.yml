site_name: Automation Scripts & Utils
site_description: Reusable automation scripts for the everyday tasks developers repeat.
site_url: https://markkimotho.github.io/automation-scripts-utils/
repo_url: https://github.com/Markkimotho/automation-scripts-utils
repo_name: Markkimotho/automation-scripts-utils
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - Prerequisites: prerequisites.md
  - Script reference: reference.md
  - Resolving conflicts: conflicts.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
